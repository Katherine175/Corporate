<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Corporate | Gestión de Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script th:src="@{/js/usuarios.js}" defer></script>
</head>

<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-logo">luxury-corporate</div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/}">Dashboard</a></li>
                <li><a th:href="@{/simulacion}">Telemetría</a></li>
                <li><a th:href="@{/reglas}">Reglas de Negocio</a></li>
                <li><a th:href="@{/}" class="active">Gestión de Usuarios</a></li>
            </ul>
        </nav>

        <main class="main">
            <header class="top-bar">
                <span>Admin Usuario</span>
            </header>

            <section class="page-body">
                <div class="page-title">
                    <div>
                        <h1>Gestión de Usuarios</h1>
                        <p>Administración de roles y permisos del sistema</p>
                    </div>
                    <button class="btn-primary" id="btnNuevoUsuario" onclick="abrirModal()">+ Nuevo Usuario</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>NOMBRE</th>
                                <th>EMAIL</th>
                                <th>ROL</th>
                                <th>UBICACIÓN</th>
                                <th>ÚLTIMO ACCESO</th>
                                <th>ESTADO</th>
                                <th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${usuarios}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.nombre}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span th:if="${user.rol != null}"
                                        th:class="'badge badge-' + ${user.rol.name().toLowerCase()}"
                                        th:text="${#strings.capitalize(#strings.toLowerCase(user.rol.name()))}"></span>
                                </td>
                                <td th:text="${user.ubicacion}"></td>
                                <td>
                                    <span th:if="${user.ultimoAcceso != null}"
                                        th:text="${#strings.arraySplit(user.ultimoAcceso, 'T')[0]}"></span>
                                </td>
                                <td>
                                    <span th:if="${user.estado != null}"
                                        th:class="'badge badge-' + ${user.estado.name().toLowerCase()}"
                                        th:text="${#strings.capitalize(#strings.toLowerCase(user.estado.name()))}"></span>
                                </td>
                                <td class="actions-cell">
                                    <button type="button" class="btn-small btn-edit" th:data-id="${user.id}"
                                        th:data-nombre="${user.nombre}" th:data-email="${user.email}"
                                        th:data-rol="${user.rol}" th:data-ubicacion="${user.ubicacion}"
                                        onclick="alert('Editar: ' + this.dataset.nombre)">Editar</button>
                                    <form th:action="@{/usuarios/eliminar/{id}(id=${user.id})}" method="post"
                                        style="display:inline;">
                                        <button type="submit" class="btn-small btn-danger">Eliminar</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>


        </main>
    </div>

    <div id="modalNuevoUsuario" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-top">
                <h3 id="usuarioModalTitle">Nuevo Usuario</h3>
                <button id="btnCerrarModal" class="btn-close" onclick="cerrarModal()">✕</button>
            </div>
            <div id="modalError" th:if="${errorForm}" class="msg-error">
                <span th:text="${errorForm}"></span>
            </div>
            <form th:action="@{/usuarios/crear}" th:object="${nuevoUsuario}" method="post" id="usuarioForm">
                <div class="form-row">
                    <label for="nombre">Nombre Completo</label>
                    <input th:field="*{nombre}" type="text" id="nombre" placeholder="Ej: Juan Pérez Gómez">
                    <span class="field-error" id="errorNombre"></span>
                </div>
                <div class="form-row">
                    <label for="email">Correo Electrónico</label>
                    <input th:field="*{email}" type="email" id="email" placeholder="usuario@smartcorp.com">
                    <span class="field-error" id="errorEmail"></span>
                </div>
                <div class="form-row-2col">
                    <div class="form-row">
                        <label for="rol">Rol</label>
                        <select th:field="*{rol}" id="rol" onchange="cambiarColorRol(this)">
                            <option value="">Seleccionar...</option>
                            <option value="ADMINISTRADOR">Administrador</option>
                            <option value="SUPERVISOR">Supervisor</option>
                            <option value="OPERADOR">Operador</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="ubicacion">Ubicación</label>
                        <input th:field="*{ubicacion}" type="text" id="ubicacion" placeholder="Ej: Sede Lima">
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" id="btnCancelar" class="btn-secondary"
                        onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastMensaje" th:if="${mensaje}" class="toast-ok">
        <span th:text="${mensaje}"></span>
    </div>
</body>

</html>
